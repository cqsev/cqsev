<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <linearGradient id="b-gov" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="b-ges" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="b-tra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <!-- Trois arcs progressifs -->
  <g transform="translate(50, 50)">
    <path d="M 13.9,-8 A 16,16 0 1,0 13.9,8"
          fill="none" stroke="url(#b-gov)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 22.2,-18.6 A 29,29 0 1,0 22.2,18.6"
          fill="none" stroke="url(#b-ges)" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M 27,-32.2 A 42,42 0 1,0 27,32.2"
          fill="none" stroke="url(#b-tra)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- CQSEV — Chaque lettre dans sa couleur signature -->
  <text y="46" font-family="Inter, 'Segoe UI', Arial, sans-serif"
        font-weight="900" font-size="42" letter-spacing="-0.5">
    <tspan x="108" fill="#3B82F6">C</tspan>
    <tspan fill="#10B981">Q</tspan>
    <tspan fill="#EF4444">S</tspan>
    <tspan fill="#F59E0B">E</tspan>
    <tspan fill="#8B5CF6">V</tspan>
  </text>

  <!-- Tagline -->
  <text x="108" y="68"
        font-family="Inter, 'Segoe UI', Arial, sans-serif"
        font-weight="400" font-size="14" fill="#64748B">Gouverner · Gérer · Transformer</text>
</svg>